name: CarLoanPayoff
options:
  bundleIdPrefix: com.shimondeitel.loanpayoff
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CarLoanPayoff:
    type: application
    platform: iOS
    sources:
      - path: CarLoanPayoff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.loanpayoff
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CarLoanPayoff/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CarLoanPayoffTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CarLoanPayoffTests
      - path: CarLoanPayoff.storekit
    dependencies:
      - target: CarLoanPayoff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.loanpayoff.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CarLoanPayoffUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CarLoanPayoffUITests
    dependencies:
      - target: CarLoanPayoff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.loanpayoff.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CarLoanPayoff:
    build:
      targets:
        CarLoanPayoff: all
        CarLoanPayoffTests: [test]
        CarLoanPayoffUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CarLoanPayoff.storekit
    test:
      config: Debug
      storeKitConfiguration: CarLoanPayoff.storekit
      targets:
        - CarLoanPayoffTests
        - CarLoanPayoffUITests
    archive:
      config: Release
